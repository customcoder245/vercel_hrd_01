        'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
        })(window,document,'script','dataLayer','GTM-5QTWV7WL');
      }
      if ('requestIdleCallback' in window) {
        requestIdleCallback(function() { setTimeout(loadGTM, 1200); }, { timeout: 3000 });

        window.addEventListener('load', function() { setTimeout(loadGTM, 2000); });

      ['scroll','click','touchstart','keydown','mousemove'].forEach(function(e) {

    })();

    <!-- Microsoft Clarity - deferred until after first interaction or idle.
         Skipped on /results and /offer pages: by then the user has converted or
         is about to, and Clarity replays add ~40KB + main-thread cost without
         giving us new insight on those pages. -->
    <script>
      (function(){
        var path = location.pathname || '';
        if (path.indexOf('/results') === 0) return;
        var clarityLoaded = false;
        function loadClarity() {
          if (clarityLoaded) return;
          clarityLoaded = true;
          (function(c,l,a,r,i,t,y){
            c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
            t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
            y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
          })(window, document, "clarity", "script", "w8v6yzjood");
        }
        if ('requestIdleCallback' in window) {
          requestIdleCallback(function() { setTimeout(loadClarity, 1500); });
        } else {
          window.addEventListener('load', function() { setTimeout(loadClarity, 2500); });
        }
        ['scroll','click','touchstart','keydown'].forEach(function(e) {
          document.addEventListener(e, loadClarity, {once: true, passive: true});
        });
      })();
    </script>

    <!-- Lazy-load DM Sans after first paint. System font stack renders the LCP text
         instantly; DM Sans swaps in once downloaded with no layout shift on body copy. -->
    <script>
      (function(){
        function loadFont() {
          var l = document.createElement('link');
          l.rel = 'stylesheet';
          l.href = 'https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap';
          document.head.appendChild(l);
        }
        if ('requestIdleCallback' in window) {
          requestIdleCallback(loadFont, { timeout: 1500 });
        } else {
          setTimeout(loadFont, 200);
        }
      })();
    </script>
